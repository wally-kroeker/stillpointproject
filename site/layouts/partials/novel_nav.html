<nav id="novel-nav">
  <button id="close-nav" title="Close Menu">×</button>
  <h2>Chapters</h2>
  <ul>
    {{ $novelSection := .Site.GetPage "section" "novel" }}
    {{ $chapters := where $novelSection.Pages ".Params.weight" "gt" 0 }}
    {{ range $chapters.ByWeight }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</nav>
