<header class="site-header">
  <div class="site-title">
    <a href="/">{{ .Site.Title }}</a>
  </div>
  <div class="site-nav">
    <button id="mode-toggle" class="mode-toggle" title="Toggle Dark Mode">🌙</button>
  </div>
</header>

<script>
  // This script is safe to be included in the header and will be executed once.
  function setMode(dark) {
    const btn = document.getElementById('mode-toggle');
    if (dark) {
      document.body.classList.add('dark-mode');
      btn.textContent = '☀️';
      localStorage.setItem('sp-mode', 'dark');
    } else {
      document.body.classList.remove('dark-mode');
      btn.textContent = '🌙';
      localStorage.setItem('sp-mode', 'light');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('mode-toggle');
    btn.addEventListener('click', () => setMode(!document.body.classList.contains('dark-mode')));
    if (localStorage.getItem('sp-mode') === 'dark') {
      setMode(true);
    }
  });
</script>
